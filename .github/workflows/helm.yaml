name: Helm chart

on:
  push:
    branches:
      - main
    paths:
      - 'charts/Chart.yaml'

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push chart
        run: |
          helm package charts
          helm push carina-csi-driver-*.tgz "oci://ghcr.io/kilnfi/helm-charts"
